function apiBase(){ return ApiClient ? ApiClient.serverAddress() : ""; }
function apiHeaders(){
    var h = { "Content-Type":"application/json" };
    if (typeof ApiClient !== "undefined"){
        var tok = null;
        try { tok = (typeof ApiClient.accessToken === "function") ? ApiClient.accessToken() : ApiClient.accessToken; } catch(_){}
        if (tok) h["X-Emby-Token"] = tok;
    }
    return h;
}
// Turn ANY thrown/rejected value into a readable string. ApiClient rejects
// with XHR-style objects that have no .message, plain strings, Response
// objects, etc. Previously this showed "(desconocido)" because we only
// looked at e.message.
function formatErr(e){
    if (e == null) return "unknown";
    if (typeof e === "string") return e;
    if (e.message) return String(e.message);
    if (e.statusText) return "HTTP " + (e.status || "?") + " " + e.statusText;
    if (e.status) return "HTTP " + e.status;
    try {
        var s = JSON.stringify(e);
        if (s && s !== "{}") return s.substring(0, 240);
    } catch(_){}
    try { return String(e); } catch(_){ return "unknown"; }
}

// Deep-merge a (possibly partial) config from the server into a fresh
// defaultConfig() so every render function is guaranteed to have its
// expected shape. Without this, if the server omits a property (first
// install, field added later, etc.) the render for that tab throws and
// the tab appears "dead" to the user.
function normalizeConfig(raw){
    var base = defaultConfig();
    if (!raw || typeof raw !== "object") return base;
    function merge(target, source){
        if (!source || typeof source !== "object") return target;
        for (var key in target){
            var dv = target[key];
            var sv = source[key];
            if (sv === undefined || sv === null) continue;
            if (dv && typeof dv === "object" && !Array.isArray(dv) && typeof sv === "object" && !Array.isArray(sv)){
                merge(dv, sv);
            } else {
                target[key] = sv;
            }
        }
        // copy extra keys the server provides that aren't in the default shape
        for (var k in source){
            if (!(k in target) && source[k] !== undefined) target[k] = source[k];
        }
        return target;
    }
    return merge(base, raw);
}

// Use Jellyfin's standard plugin configuration API.
// This is the officially supported way; it handles auth automatically
// and works identically across Jellyfin versions. Falls back to our
// custom endpoint if ApiClient is unavailable or rejects.
function loadConfig(){
    function useFetch(){
        return fetch(apiBase() + "/jellyfusion/config", { headers: apiHeaders() })
            .then(function(r){ if (!r.ok) throw new Error("HTTP "+r.status); return r.json(); });
    }
    if (typeof ApiClient !== "undefined" && ApiClient.getPluginConfiguration){
        return ApiClient.getPluginConfiguration(PLUGIN_ID).then(function(cfg){
            // Some ApiClient versions resolve with null for fresh installs.
            // Treat null as "no saved config yet" so defaults render cleanly.
            return cfg == null ? {} : cfg;
        }).catch(function(e){
            console.warn("JellyFusion: ApiClient.getPluginConfiguration failed, trying fetch fallback:", e);
            return useFetch();
        });
    }
    return useFetch();
}
function saveConfig(cfg){
    var clean = sanitizeForSave(cfg);
    if (typeof ApiClient !== "undefined" && ApiClient.updatePluginConfiguration){
        return ApiClient.updatePluginConfiguration(PLUGIN_ID, clean);
    }
    return fetch(apiBase() + "/jellyfusion/config", {
        method: "POST", headers: apiHeaders(), body: JSON.stringify(clean)
    }).then(function(r){ if (!r.ok) throw new Error("HTTP "+r.status); });
}

// Sanitize config before POST: coerce types so the backend can deserialize
// even if the user imported malformed data.
function sanitizeForSave(cfg){
    var out = JSON.parse(JSON.stringify(cfg));
    // Studios.Items.Tags must be a comma-separated string, not an array
    if (out.Studios && Array.isArray(out.Studios.Items)){
        for (var i = 0; i < out.Studios.Items.length; i++){
            var it = out.Studios.Items[i];
            if (Array.isArray(it.Tags)) it.Tags = it.Tags.join(",");
            if (typeof it.SortOrder !== "number") it.SortOrder = i;
            if (typeof it.Invert   !== "boolean") it.Invert = false;
            if (it.LinkMode == null) it.LinkMode = "Auto";
        }
    }
    // CustomText must be an array of {Key,Value} objects (List<CustomTextEntry>).
    // Guard against legacy plain-object format that would break XML serialization.
    if (out.Badges && out.Badges.CustomText != null && !Array.isArray(out.Badges.CustomText)){
        var converted = [];
        for (var k in out.Badges.CustomText){
            if (Object.prototype.hasOwnProperty.call(out.Badges.CustomText, k)){
                converted.push({ Key: k, Value: out.Badges.CustomText[k] });
            }
        }
        out.Badges.CustomText = converted;
    }
    // FontFamily "system" means "use theme default" — send null so the server
    // falls through to the preset font stack (avoids --jf-font: system in CSS).
    if (out.Theme && (out.Theme.FontFamily === "system" || out.Theme.FontFamily === "")) {
        out.Theme.FontFamily = null;
    }
    return out;
}

// ====== Toast ======
function toast(msg, isError){
    var existing = document.querySelector("#JellyFusionConfigPage .jf-toast");
    if (existing) existing.remove();
    var el = document.createElement("div");
    el.className = "jf-toast" + (isError?" jf-error":"");
    el.textContent = msg;
    document.getElementById("JellyFusionConfigPage").appendChild(el);
    requestAnimationFrame(function(){ el.classList.add("jf-show"); });
    setTimeout(function(){ el.classList.remove("jf-show"); setTimeout(function(){ el.remove(); }, 300); }, 2500);
}

function wireCustomTextEditor(){
    var editor = document.getElementById("jf-customtext-editor");
    if (!editor) return;
    // Add button
    var addBtn = document.getElementById("jf-addCustomText");
    if (addBtn) addBtn.addEventListener("click", function(){
        if (!config.Badges) config.Badges = {};
        if (!Array.isArray(config.Badges.CustomText)) config.Badges.CustomText = [];
        config.Badges.CustomText.push({ Key: "", Value: "" });
        editor.innerHTML = renderCustomTextRows(config.Badges.CustomText);
        wireCustomTextEditor();
        markDirty();
    });
    // Delete buttons
    var delBtns = editor.querySelectorAll(".jf-ct-del");
    for (var i = 0; i < delBtns.length; i++){
        (function(btn){
            btn.addEventListener("click", function(){
                var idx = parseInt(btn.getAttribute("data-idx"),10);
                if (!config.Badges || !Array.isArray(config.Badges.CustomText)) return;
                config.Badges.CustomText.splice(idx,1);
                editor.innerHTML = renderCustomTextRows(config.Badges.CustomText);
                wireCustomTextEditor();
                markDirty();
            });
        })(delBtns[i]);
    }
    // Live edit
    var keyInputs = editor.querySelectorAll(".jf-ct-key");
    var valInputs = editor.querySelectorAll(".jf-ct-val");
    for (var j = 0; j < keyInputs.length; j++){
        (function(ki, vi, idx){
            ki.addEventListener("input", function(){
                if (config.Badges && Array.isArray(config.Badges.CustomText) && config.Badges.CustomText[idx])
                    config.Badges.CustomText[idx].Key = ki.value;
                markDirty();
            });
            vi.addEventListener("input", function(){
                if (config.Badges && Array.isArray(config.Badges.CustomText) && config.Badges.CustomText[idx])
                    config.Badges.CustomText[idx].Value = vi.value;
                markDirty();
            });
        })(keyInputs[j], valInputs[j], j);
    }
}

// ====== Bind & render ======
function renderPanels(){
    var map = { home:renderHome, banner:renderBanner, tags:renderTags, studios:renderStudios, themes:renderThemes, nav:renderNav, notif:renderNotif, about:renderAbout };
    var el = document.getElementById("jf-panels");
    if (!el) return;
    var fn = map[currentTab] || renderAbout;
    var html;
    try {
        html = fn();
    } catch(err){
        console.error("JellyFusion render error (" + currentTab + "):", err);
        html = '<div class="jf-panel">' +
            '<h2>⚠ Error</h2>' +
            '<p class="jf-sub">Panel <strong>' + esc(currentTab) + '</strong> failed to render.</p>' +
            '<pre style="background:#1a1528;border:1px solid rgba(255,0,0,.3);border-radius:8px;padding:12px;font-size:11px;color:#ffb4b4;white-space:pre-wrap;word-break:break-word;max-height:240px;overflow:auto">' +
            esc(formatErr(err)) +
            '</pre>' +
            '<p style="font-size:11px;color:#9aa0a6;margin-top:10px">Abre la consola del navegador (F12) para ver el stack trace completo.</p>' +
        '</div>';
    }
    el.innerHTML = html;
    try { bindPanel(); } catch(err2){ console.error("JellyFusion bind error:", err2); }
    // Wire the CustomText editor after the Tags panel is rendered
    if (currentTab === "tags") {
        try { wireCustomTextEditor(); } catch(err3){ console.error("JellyFusion CustomText wire error:", err3); }
    }
}

// Show/hide a small "unsaved changes" dot next to the Save button so the user
// has a VISIBLE confirmation that their checkbox/select/input change was
// actually captured into config. Previously users had no feedback at all.
function markDirty(){
    var bs = document.getElementById("jf-btn-save");
    if (!bs) return;
    if (bs.classList) bs.classList.add("jf-dirty"); else bs.className += " jf-dirty";
    bs.setAttribute("data-dirty", "1");
}
function markClean(){
    var bs = document.getElementById("jf-btn-save");
    if (!bs) return;
    if (bs.classList) bs.classList.remove("jf-dirty"); else bs.className = bs.className.replace(/\bjf-dirty\b/g,"");
    bs.removeAttribute("data-dirty");
}

function bindPanel(){
    // Platform cards (re-render needed: selection state is visual)
    var plats = document.querySelectorAll("[data-platform]");
    for (var i = 0; i < plats.length; i++){
        (function(el){ el.onclick = function(){
            if (!config.Slider) config.Slider = {};
            config.Slider.PlatformStyle = el.getAttribute("data-platform");
            markDirty();
            renderPanels();
        }; })(plats[i]);
    }
    // Theme cards (re-render needed: selection state is visual)
    var ths = document.querySelectorAll("[data-theme]");
    for (var j = 0; j < ths.length; j++){
        (function(el){ el.onclick = function(){
            if (!config.Theme) config.Theme = {};
            config.Theme.ActiveTheme = el.getAttribute("data-theme");
            markDirty();
            renderPanels();
        }; })(ths[j]);
    }
    // Rail toggles (NO re-render - checkbox handles its own visual state)
    var rails = document.querySelectorAll("[data-rail-toggle]");
    for (var k = 0; k < rails.length; k++){
        (function(el){
            el.onchange = function(){
                var id = el.getAttribute("data-rail-toggle");
                if (!config.Home) config.Home = {};
                if (!config.Home.Rails) config.Home.Rails = [];
                for (var r = 0; r < config.Home.Rails.length; r++) if (config.Home.Rails[r].Id === id) config.Home.Rails[r].Enabled = el.checked;
                markDirty();
            };
        })(rails[k]);
    }

    // Simple bindings: id → config path
    var bindings = {
        // Banner
        "jf-bannerEnabled": ["Slider","Enabled","bool"],
        "jf-mode":          ["Slider","Mode"],
        "jf-bannerHeading": ["Slider","BannerHeading"],
        "jf-maxItems":      ["Slider","MaxItems","int"],
        "jf-autoplay":      ["Slider","AutoplayEnabled","bool"],
        "jf-interval":      ["Slider","AutoplayInterval","int"],
        "jf-transition":    ["Slider","TransitionEffect"],
        "jf-minRating":     ["Slider","MinCommunityRating","float"],
        "jf-showPlayed":    ["Slider","ShowPlayedItems","bool"],
        "jf-hideOnTv":      ["Slider","HideOnTv","bool"],
        "jf-bannerHeight":  ["Slider","BannerHeight"],
        "jf-imagePosition": ["Slider","ImagePosition"],
        "jf-showPlay":      ["Slider","ShowPlayButton","bool"],
        "jf-playText":      ["Slider","CustomPlayButtonText"],
        "jf-showRating":    ["Slider","ShowCommunityRating","bool"],
        "jf-showDesc":      ["Slider","ShowDescription","bool"],
        "jf-useHero":       ["Slider","UseHeroDisplayStyle","bool"],
        "jf-trailerEnabled":["Slider","TrailerEnabled","bool"],
        "jf-trailerSource": ["Slider","TrailerSource"],
        "jf-tmdbKey2":      ["Slider","TmdbApiKey"],
        "jf-trailerLang":   ["Slider","TrailerLanguage"],
        "jf-trailerSubFb":  ["Slider","TrailerSubtitleFallback","bool"],

        // Tags
        "jf-badgesEnabled": ["Badges","Enabled","bool"],
        "jf-onPosters":     ["Badges","EnableOnPosters","bool"],
        "jf-onThumbs":      ["Badges","EnableOnThumbs","bool"],
        "jf-thumbSame":     ["Badges","ThumbSameAsPoster","bool"],
        "jf-badgePos":      ["Badges","Language","Position"],
        "jf-badgeLayout":   ["Badges","Language","Layout"],
        "jf-badgeStyle":    ["Badges","Language","BadgeStyle"],
        "jf-badgeSize":     ["Badges","Language","BadgeSize","int"],
        "jf-badgeGap":      ["Badges","Language","Gap","int"],
        "jf-latTag":        ["Badges","Language","Enabled","bool"],
        "jf-latFlag":       ["Badges","Language","LatinFlagStyle"],
        "jf-latText":       ["Badges","Language","LatinText"],
        "jf-countryFlag":   ["Badges","Language","ShowProductionCountryFlag","bool"],
        "jf-subCollapse":   ["Badges","Language","SimplifiedSubMode","bool"],
        "jf-subThreshold":  ["Badges","Language","SubThreshold","int"],
        "jf-subText":       ["Badges","Language","SubText"],
        "jf-newTag":        ["Badges","Status","NewEnabled","bool"],
        "jf-newDays":       ["Badges","Status","NewDaysThreshold","int"],
        "jf-newText":       ["Badges","Status","NewText"],
        "jf-newBg":         ["Badges","Status","NewBgColor"],
        "jf-newFg":         ["Badges","Status","NewTextColor"],
        "jf-kidTag":        ["Badges","Status","KidEnabled","bool"],
        "jf-kidMode":       ["Badges","Status","KidDetectionMode"],
        "jf-kidText":       ["Badges","Status","KidText"],
        "jf-kidBg":         ["Badges","Status","KidBgColor"],
        "jf-kidFg":         ["Badges","Status","KidTextColor"],
        "jf-cacheHours":    ["Badges","CacheDurationHours","int"],
        "jf-outputFmt":     ["Badges","OutputFormat"],
        "jf-jpegQ":         ["Badges","JpegQuality","int"],

        // Studios
        "jf-studiosEnabled":["Studios","Enabled","bool"],
        "jf-sectionTitle":  ["Studios","SectionTitle"],
        "jf-imageStyle":    ["Studios","ImageStyle"],
        "jf-showName":      ["Studios","ShowName","bool"],
        "jf-hoverEffect":   ["Studios","HoverEffect","bool"],
        "jf-cardW":         ["Studios","CardWidth","int"],
        "jf-cardH":         ["Studios","CardHeight","int"],
        "jf-cardR":         ["Studios","BorderRadius","int"],

        // Home
        "jf-dataSource":    ["Home","DataSource"],
        "jf-tmdbKey":       ["Home","TmdbApiKey"],
        "jf-mdblistKey":    ["Home","MdbListApiKey"],
        "jf-traktKey":      ["Home","TraktApiKey"],

        // Themes
        "jf-primary":       ["Theme","PrimaryColor"],
        "jf-bgcolor":       ["Theme","BackgroundColor"],
        "jf-font":          ["Theme","FontFamily"],

        // Nav
        "jf-navReplace":    ["Navigation","ReplaceMyContent","bool"],

        // Notif
        "jf-notifyNew":     ["Notifications","NotifyNewContent","bool"],
        "jf-notifyKid":     ["Notifications","NotifyKidContent","bool"],
        "jf-discordEnabled":["Notifications","Discord","Enabled","bool"],
        "jf-discordWebhook":["Notifications","Discord","WebhookUrl"],
        "jf-telegramEnabled":["Notifications","Telegram","Enabled","bool"],
        "jf-telegramToken": ["Notifications","Telegram","BotToken"],
        "jf-telegramChat":  ["Notifications","Telegram","ChatId"]
    };

    for (var id in bindings){
        (function(id, path){
            var el = document.getElementById(id); if (!el) return;
            // Use 'input' for text/number/color (fires on every keystroke so the
            // user gets instant dirty feedback) and 'change' for checkbox/select.
            var evt = (el.type === "checkbox" || el.tagName === "SELECT") ? "change" : "input";
            el.addEventListener(evt, function(){
                var type = path[path.length-1];
                var keys = ["bool","int","float"].indexOf(type) >= 0 ? path.slice(0,-1) : path;
                var v;
                if (el.type === "checkbox") v = el.checked;
                else if (type === "int")   v = parseInt(el.value,10) || 0;
                else if (type === "float") v = parseFloat(el.value) || 0;
                else v = el.value;
                if (!config) return;
                var obj = config;
                for (var i = 0; i < keys.length-1; i++){
                    if (!obj[keys[i]]) obj[keys[i]] = {};
                    obj = obj[keys[i]];
                }
                obj[keys[keys.length-1]] = v;
                markDirty();
                // NOTE: no renderPanels() here. Re-rendering on every change destroys
                // focus, closes dropdowns and breaks checkbox interaction. The input
                // already reflects the new value visually; previews refresh on tab
                // switch or on structural changes (add/edit studio, theme/platform).
            });
        })(id, bindings[id]);
    }

    // Add studio button → open modal in add mode
    var addBtn = document.getElementById("jf-addStudio");
    if (addBtn){ addBtn.onclick = function(){ openStudioModal(null); }; }

    // Click an existing card → open modal in edit mode
    var sCards = document.querySelectorAll("[data-studio-idx]");
    for (var sc = 0; sc < sCards.length; sc++){
        (function(el){
            el.onclick = function(){
                var idx = parseInt(el.getAttribute("data-studio-idx"), 10);
                if (!isNaN(idx)) openStudioModal(idx);
            };
        })(sCards[sc]);
    }
}

// ====== Studio modal ======
var _smEditIdx = null;

function openStudioModal(idx){
    var T = (I18N[currentLang] && I18N[currentLang].studios) || {};
    var modal = document.getElementById("jf-studioModal"); if (!modal) return;
    if (!config.Studios) config.Studios = { Items: [] };
    if (!config.Studios.Items) config.Studios.Items = [];

    _smEditIdx = (typeof idx === "number" && idx >= 0 && idx < config.Studios.Items.length) ? idx : null;
    var item = (_smEditIdx !== null) ? config.Studios.Items[_smEditIdx] : { Name:"", Tags:"", LogoUrl:"", Gradient:"linear-gradient(135deg,#444,#222)", Invert:false, CustomUrl:null, LinkMode:"Auto", SortOrder: config.Studios.Items.length };

    // Labels from i18n with fallbacks
    var isEdit = _smEditIdx !== null;
    var titleTxt = isEdit ? (T.modalEditTitle || "Editar estudio") : (T.modalAddTitle || "Nuevo estudio");
    document.getElementById("jf-smTitle").textContent = titleTxt;
    document.getElementById("jf-smHint").textContent   = T.modalHint   || "Configura el nombre, las etiquetas y el estilo visual.";
    document.getElementById("jf-smLblName").textContent = T.modalName  || "Nombre";
    document.getElementById("jf-smLblTags").textContent = T.modalTags  || "Etiquetas (separadas por coma)";
    document.getElementById("jf-smLblLogo").textContent = T.modalLogo  || "URL del logo (opcional)";
    document.getElementById("jf-smLblGrad").textContent = T.modalGrad  || "Gradiente CSS";

    // Tags may arrive as array (legacy) or string (current) - normalize for input
    var tagsStr = item.Tags;
    if (Array.isArray(tagsStr)) tagsStr = tagsStr.join(", ");
    if (tagsStr == null) tagsStr = "";

    document.getElementById("jf-smName").value     = item.Name || "";
    document.getElementById("jf-smTags").value     = tagsStr;
    document.getElementById("jf-smLogo").value     = item.LogoUrl || "";
    document.getElementById("jf-smGradient").value = item.Gradient || "linear-gradient(135deg,#444,#222)";

    // Delete button: only for edit mode
    var delBtn = document.getElementById("jf-smDelete");
    delBtn.hidden = !isEdit;
    delBtn.textContent = T.modalDelete || "Eliminar";
    document.getElementById("jf-smCancel").textContent = T.modalCancel || "Cancelar";
    document.getElementById("jf-smSave").textContent   = T.modalSave   || "Guardar";

    refreshStudioPreview();
    modal.hidden = false;

    // Focus the name field after the modal is shown
    try { document.getElementById("jf-smName").focus(); } catch(_){}
}

function closeStudioModal(){
    var modal = document.getElementById("jf-studioModal"); if (modal) modal.hidden = true;
    _smEditIdx = null;
}

function refreshStudioPreview(){
    var name = document.getElementById("jf-smName").value || "";
    var grad = document.getElementById("jf-smGradient").value || "#333";
    var pv = document.getElementById("jf-smPreview");
    if (!pv) return;
    pv.style.background = grad;
    pv.textContent = name || "Vista previa";
}

function saveStudioModal(){
    var name = (document.getElementById("jf-smName").value || "").trim();
    if (!name){
        try { document.getElementById("jf-smName").focus(); } catch(_){}
        return;
    }
    var tagsStr = (document.getElementById("jf-smTags").value || "").trim();
    // C# expects comma-separated STRING, not an array
    var tags = tagsStr || name;
    var logo = (document.getElementById("jf-smLogo").value || "").trim();
    var grad = (document.getElementById("jf-smGradient").value || "").trim() || "linear-gradient(135deg,#444,#222)";

    if (!config.Studios) config.Studios = { Items: [] };
    if (!config.Studios.Items) config.Studios.Items = [];

    if (_smEditIdx !== null){
        var it = config.Studios.Items[_smEditIdx];
        it.Name = name; it.Tags = tags; it.LogoUrl = logo; it.Gradient = grad;
        if (typeof it.Invert    !== "boolean") it.Invert = false;
        if (it.CustomUrl == null) it.CustomUrl = null;
        if (it.LinkMode  == null) it.LinkMode = "Auto";
        if (typeof it.SortOrder !== "number") it.SortOrder = _smEditIdx;
    } else {
        config.Studios.Items.push({
            Name: name, Tags: tags, LogoUrl: logo, Gradient: grad,
            Invert: false, CustomUrl: null, LinkMode: "Auto",
            SortOrder: config.Studios.Items.length
        });
    }
    closeStudioModal();
    markDirty();
    renderPanels();
}

function deleteStudioModal(){
    if (_smEditIdx === null) return;
    if (!config.Studios || !config.Studios.Items) return;
    config.Studios.Items.splice(_smEditIdx, 1);
    closeStudioModal();
    markDirty();
    renderPanels();
}

// Wire modal buttons once (they live in static HTML, not inside panel render)
function bindStudioModalOnce(){
    if (window.__jfModalBound) return;
    window.__jfModalBound = true;
    var $  = function(id){ return document.getElementById(id); };
    if ($("jf-smCancel")) $("jf-smCancel").onclick = closeStudioModal;
    if ($("jf-smSave"))   $("jf-smSave").onclick   = saveStudioModal;
    if ($("jf-smDelete")) $("jf-smDelete").onclick = function(){
        if (_smEditIdx === null) return;
        // Inline confirmation using the same modal
        var pv = $("jf-smPreview");
        if (pv && pv.getAttribute("data-confirm") !== "1"){
            pv.setAttribute("data-confirm", "1");
            pv.textContent = "\u00bfEliminar? Click Eliminar otra vez para confirmar.";
            pv.style.background = "#ef4444";
            setTimeout(function(){
                if (pv) { pv.removeAttribute("data-confirm"); refreshStudioPreview(); }
            }, 3500);
            return;
        }
        deleteStudioModal();
    };
    // Live preview on name/gradient typing
    if ($("jf-smName"))     $("jf-smName").addEventListener("input", refreshStudioPreview);
    if ($("jf-smGradient")) $("jf-smGradient").addEventListener("input", refreshStudioPreview);
    // Close on backdrop click
    var modal = $("jf-studioModal");
    if (modal){
        modal.addEventListener("click", function(e){
            if (e.target === modal) closeStudioModal();
        });
    }
    // Escape to close
    document.addEventListener("keydown", function(e){
        var m = document.getElementById("jf-studioModal");
        if (!m || m.hidden) return;
        if (e.key === "Escape") closeStudioModal();
        else if (e.key === "Enter" && e.ctrlKey) saveStudioModal();
    });
}

function renderAll(){
    var st  = document.getElementById("jf-subtitle");
    var ll  = document.getElementById("jf-lang-label");
    var bs  = document.getElementById("jf-btn-save");
    var bc  = document.getElementById("jf-btn-cancel");
    if (st) st.textContent = t("subtitle");
    if (ll) ll.textContent = t("langLabel");
    if (bs) bs.textContent = t("save");
    if (bc) bc.textContent = t("cancel");
    renderLangs();
    renderTabs();
    if (config) renderPanels();
}

// ====== Init ======
function tryInit(){
    var page = document.getElementById("JellyFusionConfigPage");
    if (!page || page.__jfInitialized) return;
    page.__jfInitialized = true;

    var saveBtn   = document.getElementById("jf-btn-save");
    var cancelBtn = document.getElementById("jf-btn-cancel");

    // Always render structure first (tabs, chips, hero) so user sees the UI
    // even if the backend request fails or is slow.
    renderAll();
    bindStudioModalOnce();

    loadConfig().then(function(cfg){
        config = normalizeConfig(cfg);
        originalConfig = JSON.parse(JSON.stringify(config));
        currentLang = config.Language || "es";
        renderAll();
        markClean();
    }).catch(function(e){
        console.error("JellyFusion load error:", e);
        config = defaultConfig();
        originalConfig = JSON.parse(JSON.stringify(config));
        renderAll();
        markClean();
        toast(t("loadErr") + " (" + formatErr(e) + ")", true);
    });

    if (saveBtn) saveBtn.onclick = function(){
        if (!config) return;
        var payload = sanitizeForSave(config);
        saveConfig(config).then(function(){
            toast(t("savedOk"));
            originalConfig = JSON.parse(JSON.stringify(config));
            markClean();
        }).catch(function(e){
            console.error("JellyFusion save error (primary):", e);
            fetch(apiBase() + "/jellyfusion/config", {
                method: "POST", headers: apiHeaders(), body: JSON.stringify(payload)
            }).then(function(r){
                if (!r.ok) throw new Error("HTTP " + r.status);
                toast(t("savedOk"));
                originalConfig = JSON.parse(JSON.stringify(config));
                markClean();
            }).catch(function(e2){
                console.error("JellyFusion save error (fallback):", e2);
                toast(t("savedErr") + " (" + formatErr(e2) + ")", true);
            });
        });
    };
    if (cancelBtn) cancelBtn.onclick = function(){
        if (!originalConfig) return;
        config = JSON.parse(JSON.stringify(originalConfig));
        currentLang = config.Language || "es";
        renderAll();
        markClean();
    };
}

// Expose init globally so the boot trigger can find it
window.__jfInit = tryInit;

// Try init on multiple events (Jellyfin SPA navigation)
if (document.readyState === "complete" || document.readyState === "interactive") {
    setTimeout(tryInit, 10);
} else {
    document.addEventListener("DOMContentLoaded", tryInit);
}
document.addEventListener("viewshow", function(ev){
    if (ev && ev.target && ev.target.id === "JellyFusionConfigPage") tryInit();
});

})();
</script>

</div>
