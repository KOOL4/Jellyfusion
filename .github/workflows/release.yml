name: Build & Release JellyFusion

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH:   'src/JellyFusion/JellyFusion.csproj'

jobs:
  build:
    name: Build plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build
        run: |
          dotnet build ${{ env.PROJECT_PATH }} \
            --configuration Release \
            --no-restore \
            -p:Version=${{ github.ref_name && github.ref_name || '1.0.0' }}

      - name: Publish
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} \
            --configuration Release \
            --no-restore \
            --output ./publish

      - name: Generate meta.json
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          cat > publish/meta.json <<EOF
          {
              "category": "General",
              "changelog": "Release ${VERSION}",
              "description": "All-in-one Jellyfin plugin: Netflix-style slider, quality badges (LAT/SUB/NUEVO/KID), studios, themes and notifications.",
              "guid": "a1b2c3d4-e5f6-7890-abcd-ef1234567890",
              "imagePath": "",
              "name": "JellyFusion",
              "overview": "Combines Editor's Choice and JellyTag into a single unified plugin with multi-language support.",
              "owner": "KOOL4",
              "targetAbi": "10.10.0.0",
              "timestamp": "${TIMESTAMP}",
              "version": "${VERSION}.0"
          }
          EOF
          echo "--- publish contents ---"
          ls -la publish/

      - name: Package ZIP
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"   # strip leading 'v'
          cd publish
          # Only ship JellyFusion.dll + meta.json — everything else comes
          # from the Jellyfin host (thanks to PrivateAssets=all in csproj).
          zip "../JellyFusion-v${VERSION}.zip" JellyFusion.dll meta.json
          cd ..
          echo "PLUGIN_ZIP=JellyFusion-v${VERSION}.zip" >> $GITHUB_ENV
          echo "PLUGIN_VERSION=${VERSION}" >> $GITHUB_ENV
          unzip -l "JellyFusion-v${VERSION}.zip"

      - name: Compute MD5 checksum
        run: |
          MD5=$(md5sum "${{ env.PLUGIN_ZIP }}" | awk '{print $1}')
          echo "PLUGIN_MD5=${MD5}" >> $GITHUB_ENV

      - name: Update manifest.json
        run: |
          node - <<'EOF'
          const fs      = require('fs');
          const path    = 'manifest.json';
          const manifest = JSON.parse(fs.readFileSync(path, 'utf8'));
          const version = process.env.PLUGIN_VERSION;
          const newEntry = {
            version:   version,
            changelog: `Release ${version}`,
            targetAbi: "10.10.0.0",
            sourceUrl: `https://github.com/${{ github.repository }}/releases/download/v${version}/JellyFusion-v${version}.zip`,
            checksum:  process.env.PLUGIN_MD5,
            timestamp: new Date().toISOString().replace('T', ' ').substring(0, 19)
          };
          manifest[0].versions.unshift(newEntry);
          fs.writeFileSync(path, JSON.stringify(manifest, null, 2));
          console.log('manifest.json updated with version', version);
          EOF

      - name: Commit updated manifest
        uses: EndBug/add-and-commit@v9
        with:
          add:            'manifest.json'
          message:        'chore: update manifest for ${{ github.ref_name }}'
          default_author: github_actions

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.PLUGIN_ZIP }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
